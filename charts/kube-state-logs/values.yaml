# Default values for kube-state-logs

image:
  # The registry to pull the image from
  registry: ghcr.io
  # The image organization
  org: azure
  # The name of the image
  name: kube-state-logs
  # The tag of the image
  tag: latest
  pullSecrets:
    name:

# Deployment mode: "simple" or "advanced"
# - simple: Single Deployment that monitors all resources (default)
# - advanced: DaemonSet for pod/container (per-node), Deployment for other resources
deploymentMode: simple

# Application configuration
config:
  logInterval: "1m"
  resources:
    - pod
    - container
    - deployment
    - job
    - cronjob
    - statefulset
    - node
    - namespace
    - crd
    - horizontalpodautoscaler
    - replicaset
  namespaces: ""
  logLevel: "info"

  # Enable ADX-Mon annotations on the pods.
  enableADXMonAnnotations: false
  adxMonLogDestination: ""

  # Optional: list of environment variables to capture from each container (example: ["GOMAXPROCS"]).
  containerEnvVars:
    - "GOMAXPROCS"

# Resource limits for deployment (simple mode) or cluster deployment (advanced mode)
resources:
  limits:
    cpu: 500m
    memory: 1500Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Resource limits for DaemonSet pods (advanced mode only)
# These can be smaller since each pod only tracks pods on its local node
daemonset:
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Node selection and scheduling
nodeSelector: {}

tolerations: []

# Used to inject additional resources into the helm release if needed.
# Example:
# extraResources:
#   - name: my-extra-configmap
#     template: |
#       apiVersion: v1
#       kind: ConfigMap
#       metadata:
#         name: my-extra-configmap
#       data:
#         my-key: my-value
extraResources: []
