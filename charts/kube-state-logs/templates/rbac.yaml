    resources: ["endpoints"]
    verbs: ["list", "watch"]
{{- end }}
{{- if or (has "node" $resources) (has "all" $resources) }}
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]
{{- end }}
{{- if or (has "namespace" $resources) (has "all" $resources) }}
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list", "watch"]
{{- end }}
{{- if or (has "job" $resources) (has "all" $resources) }}
