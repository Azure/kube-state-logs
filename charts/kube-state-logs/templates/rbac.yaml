    resources: ["daemonsets"]
    verbs: ["list", "watch"]
{{- end }}
{{- if or (has "pod" $resources) (has "container" $resources) (has "all" $resources) }}
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "watch"]
{{- end }}
{{- if or (has "container" $resources) (has "all" $resources) }}
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
{{- end }}
{{- if or (has "service" $resources) (has "all" $resources) }}
