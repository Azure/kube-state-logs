{{- if eq .Values.deploymentMode "simple" }}
# Simple mode: Single ServiceAccount, ClusterRole, and ClusterRoleBinding
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kube-state-logs.fullname" . }}
  labels:
    {{- include "kube-state-logs.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
