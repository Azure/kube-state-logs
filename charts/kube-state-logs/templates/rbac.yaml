{{- if .Values.config.crdConfigs }}
{{- range .Values.config.crdConfigs }}
{{- $apiGroup := regexReplaceAll "/.*$" .apiVersion "" }}
  - apiGroups: ["{{ $apiGroup }}"]
    resources: ["{{ .resource }}"]
    verbs: ["list", "watch"]
{{- end }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-state-logs.fullname" . }}
  labels:
    {{- include "kube-state-logs.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-state-logs.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-state-logs.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- else }}
# Advanced mode: Separate RBAC for node (DaemonSet) and cluster (Deployment)

# Node ServiceAccount - used by DaemonSet for pod/container on local node
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kube-state-logs.fullname" . }}-node
  labels:
    {{- include "kube-state-logs.labels" . | nindent 4 }}
    app.kubernetes.io/component: node
---
# Cluster ServiceAccount - used by Deployment for all other resources
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kube-state-logs.fullname" . }}-cluster
  labels:
    {{- include "kube-state-logs.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster
---
# Node ClusterRole - minimal permissions for pods and metrics only
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-state-logs.fullname" . }}-node
  labels:
    {{- include "kube-state-logs.labels" . | nindent 4 }}
    app.kubernetes.io/component: node
rules:
{{- $resources := .Values.config.resources | toStrings }}
{{- if .Values.daemonset.useKubeletAPI }}
  # When using kubelet API, we need nodes/proxy permission to access kubelet
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get"]
{{- else }}
{{- if or (has "pod" $resources) (has "container" $resources) (has "all" $resources) }}
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "watch"]
{{- end }}
{{- end }}
{{- if or (has "container" $resources) (has "all" $resources) }}
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
{{- end }}
---
# Cluster ClusterRole - permissions for all non-pod/container resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
