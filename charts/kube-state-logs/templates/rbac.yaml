    resources: ["deployments"]
    verbs: ["list", "watch"]
{{- end }}
{{- if or (has "replicaset" $resources) (has "all" $resources) }}
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["list", "watch"]
{{- end }}
